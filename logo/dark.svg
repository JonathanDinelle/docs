      <stop offset="35%"  stop-color="#1188ee"/>
      <stop offset="100%" stop-color="#0a1a77"/>
    </linearGradient>

    <linearGradient id="grad-right" x1="0" y1="47" x2="0" y2="128" gradientUnits="userSpaceOnUse">
